inputs:
  # ROS2 related inputs
  nix-ros-overlay: # ros overlay
    url: github:lopsided98/nix-ros-overlay/master
  nixpkgs: # use the nixpkgs from the ros overlay to ensure compatibility
    follows: nix-ros-overlay/nixpkgs
  nix-ros-workspace: # ros workspace overlay replaces buildEnv from the nix ros overlay
    url: github:RandomSpaceship/nix-ros-workspace
    inputs:
      nixpkgs:
        follows: nixpkgs
      nix-ros-overlay:
        follows: nix-ros-overlay
  # formatting
  treefmt-nix:
    url: github:numtide/treefmt-nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  # Other utilities
  nixgl:
    url: github:nix-community/nixGL/main
    inputs:
      flake-utils:
        follows: nix-ros-overlay/flake-utils
      nixpkgs:
        follows: nixpkgs
  mk-shell-bin:
    url: github:rrbutani/nix-mk-shell-bin
  ros2nix:
    url: github:wentasah/ros2nix
    inputs:
      nix-ros-overlay:
        follows: nix-ros-overlay
      flake-utils:
        follows: nix-ros-overlay/flake-utils
      nixpkgs:
        follows: nixpkgs
      rosdistro:
        follows: nix-ros-overlay/rosdistro
      treefmt-nix:
        follows: treefmt-nix
allow_unfree: true
imports:
  - ./nix/scripts.nix
  - ./nix/treefmt.nix
  - ./nix/profiles.nix
  - ./nix/machines/default.nix
